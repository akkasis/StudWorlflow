services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # PostgreSQL is intentionally not published with ports.
    # It should be reachable only from other compose services.

  backend:
    build:
      context: ./backend
    restart: always
    env_file:
      - ./backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: ./deploy/frontend.Dockerfile
    restart: always
    env_file:
      - ./deploy/frontend.env.production
    depends_on:
      - backend
    ports:
      - "3000:3000"

  adminer:
    image: adminer:4.8.1
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Adminer is bound to localhost only. Use an SSH tunnel to access it:
      # ssh -L 8080:localhost:8080 user@SERVER_IP
      - "127.0.0.1:8080:8080"

volumes:
  postgres_data:
